<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whispr Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
    .header { background: #111118; border-bottom: 1px solid #1e1e2a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header h1 span { color: #6366f1; }
    .stats { display: flex; gap: 16px; }
    .stat { background: #111118; border: 1px solid #1e1e2a; border-radius: 10px; padding: 14px 20px; min-width: 120px; }
    .stat-value { font-size: 24px; font-weight: 700; color: #6366f1; }
    .stat-label { font-size: 12px; color: #888; margin-top: 2px; }
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { background: #111118; border: 1px solid #1e1e2a; color: #888; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s; }
    .tab.active { background: #6366f1; color: white; border-color: #6366f1; }
    .tab:hover:not(.active) { border-color: #333; color: #ccc; }
    .panel { display: none; }
    .panel.active { display: block; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 14px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #1e1e2a; }
    td { padding: 12px 14px; font-size: 14px; border-bottom: 1px solid #1a1a24; }
    tr:hover td { background: #111118; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
    .badge-spam { background: #f59e0b22; color: #f59e0b; }
    .badge-abuse { background: #ef444422; color: #ef4444; }
    .badge-inappropriate { background: #8b5cf622; color: #8b5cf6; }
    .badge-other { background: #6b728022; color: #9ca3af; }
    .badge-permanent { background: #ef444422; color: #ef4444; }
    .badge-temp { background: #f59e0b22; color: #f59e0b; }
    .badge-active { background: #ef444422; color: #ef4444; }
    .badge-expired { background: #22c55e22; color: #22c55e; }
    .btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; border: none; font-family: inherit; transition: all 0.2s; }
    .btn-ban { background: #ef4444; color: white; }
    .btn-ban:hover { background: #dc2626; }
    .btn-unban { background: #22c55e; color: white; }
    .btn-unban:hover { background: #16a34a; }
    .empty { text-align: center; padding: 40px; color: #555; }
    .login { max-width: 360px; margin: 100px auto; text-align: center; }
    .login h2 { margin-bottom: 20px; font-size: 20px; }
    .login input { width: 100%; padding: 10px 14px; background: #111118; border: 1px solid #1e1e2a; border-radius: 8px; color: #e0e0e0; font-size: 14px; margin-bottom: 12px; font-family: inherit; }
    .login input:focus { outline: none; border-color: #6366f1; }
    .login button { width: 100%; padding: 10px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; }
    .login button:hover { background: #4f46e5; }
    .msg-snapshot { font-size: 12px; color: #666; max-width: 300px; white-space: pre-line; max-height: 60px; overflow: hidden; cursor: pointer; }
    .msg-snapshot:hover { color: #999; }
    .time { font-size: 12px; color: #555; }
    .refresh-btn { background: none; border: 1px solid #1e1e2a; color: #888; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; }
    .refresh-btn:hover { border-color: #333; color: #ccc; }
    @media (max-width: 760px) {
      .stats { flex-wrap: wrap; }
      th:nth-child(4), td:nth-child(4), th:nth-child(5), td:nth-child(5) { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    let TOKEN = localStorage.getItem('whispr_admin_token') || '';
    const API = '';

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        ...opts,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN, ...(opts.headers || {}) }
      });
      if (res.status === 401) { TOKEN = ''; localStorage.removeItem('whispr_admin_token'); render(); return null; }
      return res.json();
    }

    let tab = 'reports';
    let reports = [];
    let bans = [];
    let stats = {};

    async function loadData() {
      const [r, b, s] = await Promise.all([
        api('/api/admin/reports'),
        api('/api/admin/bans'),
        api('/api/stats')
      ]);
      if (r) reports = r;
      if (b) bans = b;
      if (s) stats = s;
      render();
    }

    function reasonBadge(reason) {
      const map = { spam: ['垃圾广告', 'badge-spam'], abuse: ['骚扰辱骂', 'badge-abuse'], inappropriate: ['不当内容', 'badge-inappropriate'] };
      const [label, cls] = map[reason] || [reason || '其他', 'badge-other'];
      return '<span class="badge ' + cls + '">' + label + '</span>';
    }

    function banStatus(b) {
      if (!b.expires_at) return '<span class="badge badge-permanent">永久</span>';
      const left = b.expires_at - Math.floor(Date.now() / 1000);
      if (left <= 0) return '<span class="badge badge-expired">已过期</span>';
      const h = Math.floor(left / 3600);
      const m = Math.floor((left % 3600) / 60);
      return '<span class="badge badge-active">' + (h > 0 ? h + 'h ' : '') + m + 'm 剩余</span>';
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
      return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function render() {
      const app = document.getElementById('app');

      if (!TOKEN) {
        app.innerHTML = '<div class="login"><h2>Whispr <span style="color:#6366f1">Admin</span></h2><input id="token-input" type="password" placeholder="输入管理 Token" autofocus><button onclick="login()">进入</button></div>';
        document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
        return;
      }

      const online = stats.online || 0;
      const waiting = stats.waiting || 0;
      const chatting = online - waiting;

      app.innerHTML = '<div class="header"><h1>Whispr <span>Admin</span></h1><div class="stats">' +
        '<div class="stat"><div class="stat-value">' + online + '</div><div class="stat-label">在线</div></div>' +
        '<div class="stat"><div class="stat-value">' + chatting + '</div><div class="stat-label">聊天中</div></div>' +
        '<div class="stat"><div class="stat-value">' + waiting + '</div><div class="stat-label">等待中</div></div>' +
        '<div class="stat"><div class="stat-value">' + reports.length + '</div><div class="stat-label">举报</div></div>' +
        '<div class="stat"><div class="stat-value">' + bans.length + '</div><div class="stat-label">封禁</div></div>' +
        '</div></div>' +
        '<div class="container">' +
        '<div class="tabs">' +
        '<button class="tab ' + (tab === 'reports' ? 'active' : '') + '" onclick="switchTab(\'reports\')">举报记录 (' + reports.length + ')</button>' +
        '<button class="tab ' + (tab === 'bans' ? 'active' : '') + '" onclick="switchTab(\'bans\')">封禁列表 (' + bans.length + ')</button>' +
        '<button class="refresh-btn" onclick="loadData()">刷新</button>' +
        '</div>' +
        '<div class="panel ' + (tab === 'reports' ? 'active' : '') + '" id="reports-panel">' + renderReports() + '</div>' +
        '<div class="panel ' + (tab === 'bans' ? 'active' : '') + '" id="bans-panel">' + renderBans() + '</div>' +
        '</div>';
    }

    function renderReports() {
      if (!reports.length) return '<div class="empty">暂无举报记录</div>';
      return '<table><thead><tr><th>时间</th><th>房间</th><th>被举报</th><th>原因</th><th>聊天快照</th><th>操作</th></tr></thead><tbody>' +
        reports.map(r => '<tr>' +
          '<td class="time">' + formatTime(r.created_at) + '</td>' +
          '<td style="font-family:monospace;font-size:12px">' + (r.room_id || '').slice(0, 8) + '...</td>' +
          '<td>' + (r.partner_nickname || '-') + '</td>' +
          '<td>' + reasonBadge(r.reason) + '</td>' +
          '<td><div class="msg-snapshot" title="' + (r.messages_snapshot || '').replace(/"/g, '&quot;') + '">' + (r.messages_snapshot || '-').split('\n').slice(0, 3).join('<br>') + '</div></td>' +
          '<td><button class="btn btn-ban" onclick="quickBan(\'' + (r.partner_nickname || '') + '\')">封禁</button></td>' +
          '</tr>').join('') +
        '</tbody></table>';
    }

    function renderBans() {
      if (!bans.length) return '<div class="empty">暂无封禁记录</div>';
      return '<table><thead><tr><th>IP</th><th>原因</th><th>状态</th><th>封禁时间</th><th>操作</th></tr></thead><tbody>' +
        bans.map(b => '<tr>' +
          '<td style="font-family:monospace;font-size:13px">' + b.ip + '</td>' +
          '<td style="font-size:13px">' + (b.reason || '-') + '</td>' +
          '<td>' + banStatus(b) + '</td>' +
          '<td class="time">' + formatTime(b.created_at) + '</td>' +
          '<td><button class="btn btn-unban" onclick="unban(\'' + b.ip + '\')">解封</button></td>' +
          '</tr>').join('') +
        '</tbody></table>';
    }

    function switchTab(t) {
      tab = t;
      render();
    }

    function login() {
      const input = document.getElementById('token-input');
      TOKEN = input.value.trim();
      if (TOKEN) {
        localStorage.setItem('whispr_admin_token', TOKEN);
        loadData();
      }
    }

    async function quickBan(nickname) {
      if (!nickname) return;
      const ip = prompt('输入要封禁的 IP（昵称: ' + nickname + '）:');
      if (!ip) return;
      const reason = prompt('封禁原因:') || 'Manual ban';
      await api('/api/admin/ban', { method: 'POST', body: JSON.stringify({ ip, reason }) });
      loadData();
    }

    async function unban(ip) {
      if (!confirm('解封 ' + ip + ' ?')) return;
      await api('/api/admin/unban', { method: 'POST', body: JSON.stringify({ ip }) });
      loadData();
    }

    // Auto refresh every 30s
    if (TOKEN) loadData();
    setInterval(() => { if (TOKEN) loadData(); }, 30000);
  </script>
</body>
</html>
