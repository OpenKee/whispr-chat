<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Whispr Admin</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #fafbfc;
      --line: #e5e7eb;
      --line-strong: #d7dbe2;
      --text: #111827;
      --text-soft: #6b7280;
      --primary: #111827;
      --danger: #dc2626;
      --success: #16a34a;
      --warning: #d97706;
      --violet: #7c3aed;
      --shadow: 0 10px 30px rgba(17,24,39,.06);
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Noto Sans SC", sans-serif;
      -webkit-font-smoothing: antialiased;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }
    .shell {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 96px;
    }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .title-wrap { display: flex; flex-direction: column; gap: 6px; }
    .eyebrow {
      color: var(--text-soft);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 600;
    }
    h1 {
      font-size: clamp(28px, 4vw, 36px);
      line-height: 1.04;
      letter-spacing: -.03em;
      font-weight: 800;
    }
    .sub {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
      max-width: 560px;
    }
    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .btn, .tab, .login button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
      transition: .16s ease;
    }
    .btn {
      height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid var(--line-strong);
      background: var(--panel);
      color: var(--text);
    }
    .btn:hover, .tab:hover, .login button:hover { transform: translateY(-1px); }
    .btn-primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      padding: 16px;
      box-shadow: var(--shadow);
      min-width: 0;
    }
    .stat-value {
      font-size: clamp(24px, 4vw, 32px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }
    .stat-label {
      color: var(--text-soft);
      font-size: 12px;
      font-weight: 600;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px;
      margin-bottom: 16px;
      position: sticky;
      top: 10px;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .tabs {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 0;
    }
    .tab {
      flex: 1;
      min-width: 0;
      height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      background: transparent;
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .tab.active {
      background: var(--primary);
      color: #fff;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .table-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      font-size: 12px;
      color: var(--text-soft);
      font-weight: 700;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }
    td {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 14px;
      line-height: 1.55;
    }
    tr:last-child td { border-bottom: 0; }
    tr:hover td { background: #fcfcfd; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: #4b5563; }
    .muted { color: var(--text-soft); font-size: 13px; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-spam { background: #fff7ed; color: var(--warning); }
    .badge-abuse { background: #fef2f2; color: var(--danger); }
    .badge-inappropriate { background: #f5f3ff; color: var(--violet); }
    .badge-other { background: #f3f4f6; color: #4b5563; }
    .badge-active, .badge-permanent { background: #fef2f2; color: var(--danger); }
    .badge-expired { background: #f0fdf4; color: var(--success); }
    .snapshot {
      max-width: 340px;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
      color: #374151;
      white-space: pre-line;
    }
    .row-actions { display: flex; gap: 8px; }
    .btn-danger {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }
    .btn-success {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
    }
    .mobile-list { display: none; gap: 12px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    .card-title { font-size: 16px; font-weight: 700; line-height: 1.2; }
    .card-time { color: var(--text-soft); font-size: 12px; margin-top: 4px; }
    .card-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }
    .field {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
    }
    .field-label {
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .field-value {
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-line;
    }
    .card-actions { display: flex; gap: 8px; }
    .card-actions .btn { flex: 1; }
    .empty {
      background: var(--panel);
      border: 1px dashed var(--line-strong);
      border-radius: 18px;
      color: var(--text-soft);
      text-align: center;
      padding: 52px 18px;
    }
    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .login {
      width: min(100%, 420px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .login p {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.6;
      margin: 10px 0 16px;
    }
    .login input {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--line-strong);
      font: inherit;
      outline: none;
      margin-bottom: 12px;
      background: #fff;
      color: var(--text);
    }
    .login input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(17,24,39,.08);
    }
    .login button {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
    }
    @media (max-width: 920px) {
      .topbar { flex-direction: column; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .shell { padding: 16px 12px 100px; }
      .stats {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        scrollbar-width: none;
      }
      .stats::-webkit-scrollbar { display: none; }
      .stat { min-width: 126px; flex: 0 0 auto; }
      .toolbar {
        position: fixed;
        left: 12px;
        right: 12px;
        bottom: calc(10px + env(safe-area-inset-bottom));
        top: auto;
      }
      .table-wrap { display: none; }
      .mobile-list { display: grid; }
      .btn.hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    let TOKEN = localStorage.getItem('whispr_admin_token') || '';
    const API = '';
    let tab = 'reports';
    let reports = [];
    let bans = [];
    let stats = {};

    async function api(path, opts = {}) {
      const res = await fetch(API + path, {
        ...opts,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + TOKEN,
          ...(opts.headers || {})
        }
      });
      if (res.status === 401) {
        TOKEN = '';
        localStorage.removeItem('whispr_admin_token');
        render();
        return null;
      }
      return res.json();
    }

    async function loadData() {
      const [r, b, s] = await Promise.all([
        api('/api/admin/reports'),
        api('/api/admin/bans'),
        api('/api/stats')
      ]);
      if (r) reports = r;
      if (b) bans = b;
      if (s) stats = s;
      render();
    }

    function esc(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function reasonBadge(reason) {
      const map = {
        spam: ['垃圾广告', 'badge-spam'],
        abuse: ['骚扰辱骂', 'badge-abuse'],
        inappropriate: ['不当内容', 'badge-inappropriate']
      };
      const [label, cls] = map[reason] || [reason || '其他', 'badge-other'];
      return '<span class="badge ' + cls + '">' + esc(label) + '</span>';
    }

    function banBadge(item) {
      if (!item.expires_at) return '<span class="badge badge-permanent">永久</span>';
      const left = item.expires_at - Math.floor(Date.now() / 1000);
      if (left <= 0) return '<span class="badge badge-expired">已过期</span>';
      const h = Math.floor(left / 3600);
      const m = Math.floor((left % 3600) / 60);
      return '<span class="badge badge-active">' + (h > 0 ? h + 'h ' : '') + m + 'm 剩余</span>';
    }

    function formatTime(ts) {
      if (!ts) return '';
      const d = new Date(typeof ts === 'number' ? ts * 1000 : ts);
      return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function statCard(value, label) {
      return '<div class="stat"><div class="stat-value">' + value + '</div><div class="stat-label">' + label + '</div></div>';
    }

    function renderLogin() {
      return '<div class="login-wrap"><div class="login">' +
        '<div class="eyebrow">Whispr Moderator</div>' +
        '<h1>Admin</h1>' +
        '<p>看举报、查封禁、处理在线状态。保持简单，重点信息直接到眼前。</p>' +
        '<input id="token-input" type="password" placeholder="输入管理 Token" autofocus />' +
        '<button onclick="login()">进入</button>' +
      '</div></div>';
    }

    function renderReports() {
      if (!reports.length) return '<div class="empty">暂无举报记录</div>';
      return '<div class="table-wrap"><table><thead><tr><th>时间</th><th>房间</th><th>被举报</th><th>原因</th><th>聊天快照</th><th>操作</th></tr></thead><tbody>' +
        reports.map(r => '<tr>' +
          '<td class="muted">' + formatTime(r.created_at) + '</td>' +
          '<td class="mono">' + esc((r.room_id || '').slice(0, 10)) + '</td>' +
          '<td>' + esc(r.partner_nickname || '-') + '</td>' +
          '<td>' + reasonBadge(r.reason) + '</td>' +
          '<td><div class="snapshot">' + esc(r.messages_snapshot || '-') + '</div></td>' +
          '<td><div class="row-actions"><button class="btn btn-danger" onclick="quickBan(' + JSON.stringify(r.partner_nickname || '') + ')">封禁</button></div></td>' +
        '</tr>').join('') +
      '</tbody></table></div>' +
      '<div class="mobile-list">' + reports.map(r => '<article class="card">' +
        '<div class="card-head"><div><div class="card-title">' + esc(r.partner_nickname || '未知用户') + '</div><div class="card-time">' + formatTime(r.created_at) + '</div></div>' + reasonBadge(r.reason) + '</div>' +
        '<div class="card-grid">' +
          '<div class="field"><div class="field-label">房间</div><div class="field-value mono">' + esc(r.room_id || '-') + '</div></div>' +
          '<div class="field"><div class="field-label">聊天快照</div><div class="field-value">' + esc(r.messages_snapshot || '-') + '</div></div>' +
        '</div>' +
        '<div class="card-actions"><button class="btn btn-danger" onclick="quickBan(' + JSON.stringify(r.partner_nickname || '') + ')">封禁</button></div>' +
      '</article>').join('') + '</div>';
    }

    function renderBans() {
      if (!bans.length) return '<div class="empty">暂无封禁记录</div>';
      return '<div class="table-wrap"><table><thead><tr><th>IP</th><th>原因</th><th>状态</th><th>封禁时间</th><th>操作</th></tr></thead><tbody>' +
        bans.map(b => '<tr>' +
          '<td class="mono">' + esc(b.ip) + '</td>' +
          '<td>' + esc(b.reason || '-') + '</td>' +
          '<td>' + banBadge(b) + '</td>' +
          '<td class="muted">' + formatTime(b.created_at) + '</td>' +
          '<td><div class="row-actions"><button class="btn btn-success" onclick="unban(' + JSON.stringify(b.ip) + ')">解封</button></div></td>' +
        '</tr>').join('') +
      '</tbody></table></div>' +
      '<div class="mobile-list">' + bans.map(b => '<article class="card">' +
        '<div class="card-head"><div><div class="card-title mono">' + esc(b.ip) + '</div><div class="card-time">' + formatTime(b.created_at) + '</div></div>' + banBadge(b) + '</div>' +
        '<div class="card-grid">' +
          '<div class="field"><div class="field-label">原因</div><div class="field-value">' + esc(b.reason || '-') + '</div></div>' +
        '</div>' +
        '<div class="card-actions"><button class="btn btn-success" onclick="unban(' + JSON.stringify(b.ip) + ')">解封</button></div>' +
      '</article>').join('') + '</div>';
    }

    function renderApp() {
      const online = stats.online || 0;
      const waiting = stats.waiting || 0;
      const chatting = Math.max(0, online - waiting);
      return '<div class="shell">' +
        '<div class="topbar">' +
          '<div class="title-wrap">' +
            '<div class="eyebrow">Whispr Admin</div>' +
            '<h1>管理台</h1>' +
            '<div class="sub">举报、封禁、在线状态都放在一个页面里。尽量少装饰，先把事处理掉。</div>' +
          '</div>' +
          '<div class="top-actions">' +
            '<button class="btn" onclick="loadData()">刷新</button>' +
            '<button class="btn hide-mobile" onclick="logout()">退出</button>' +
          '</div>' +
        '</div>' +
        '<div class="stats">' +
          statCard(online, '在线') +
          statCard(chatting, '聊天中') +
          statCard(waiting, '等待中') +
          statCard(reports.length, '举报') +
          statCard(bans.length, '封禁') +
        '</div>' +
        '<div class="toolbar">' +
          '<div class="tabs">' +
            '<button class="tab ' + (tab === 'reports' ? 'active' : '') + '" onclick="switchTab(\'reports\')">举报记录 ' + reports.length + '</button>' +
            '<button class="tab ' + (tab === 'bans' ? 'active' : '') + '" onclick="switchTab(\'bans\')">封禁列表 ' + bans.length + '</button>' +
          '</div>' +
          '<button class="btn btn-primary" onclick="loadData()">刷新</button>' +
        '</div>' +
        '<section class="panel ' + (tab === 'reports' ? 'active' : '') + '">' + renderReports() + '</section>' +
        '<section class="panel ' + (tab === 'bans' ? 'active' : '') + '">' + renderBans() + '</section>' +
      '</div>';
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = TOKEN ? renderApp() : renderLogin();
      if (!TOKEN) {
        document.getElementById('token-input').addEventListener('keydown', e => {
          if (e.key === 'Enter') login();
        });
      }
    }

    function switchTab(next) { tab = next; render(); }

    function login() {
      const input = document.getElementById('token-input');
      TOKEN = input.value.trim();
      if (!TOKEN) return;
      localStorage.setItem('whispr_admin_token', TOKEN);
      loadData();
    }

    function logout() {
      TOKEN = '';
      localStorage.removeItem('whispr_admin_token');
      render();
    }

    async function quickBan(nickname) {
      if (!nickname) return;
      const ip = prompt('输入要封禁的 IP（昵称: ' + nickname + '）:');
      if (!ip) return;
      const reason = prompt('封禁原因:') || 'Manual ban';
      await api('/api/admin/ban', { method: 'POST', body: JSON.stringify({ ip, reason }) });
      loadData();
    }

    async function unban(ip) {
      if (!confirm('解封 ' + ip + ' ?')) return;
      await api('/api/admin/unban', { method: 'POST', body: JSON.stringify({ ip }) });
      loadData();
    }

    if (TOKEN) loadData();
    else render();
    setInterval(() => { if (TOKEN) loadData(); }, 30000);
  </script>
</body>
</html>
